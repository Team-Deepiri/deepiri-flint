services:
  flint:
    build: ..
    image: deepiri-flint:local
    environment:
      FLINT_SUGAR_GLIDER_URL: http://synapse-sidecar:8081
      FLINT_ADMIN_PORT: "9108"
      FLINT_TINDER: /config/tinder.json
      FLINT_DRY_RUN: "true"
    ports:
      - "9108:9108"
    volumes:
      - ../tinder.example.json:/config/tinder.json:ro
