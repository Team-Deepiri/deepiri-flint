replicaCount: 2
image:
  repository: ghcr.io/team-deepiri/deepiri-bedd
  tag: "0.5.0"
  pullPolicy: IfNotPresent
service:
  adminPort: 9108
env:
  BEDD_BUS_URL: http://127.0.0.1:8081
  BEDD_CONSUMER_GROUP: bedd-workers
  BEDD_DRY_RUN: "false"
  BEDD_LOG_LEVEL: info
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi
